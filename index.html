<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .progress-bar {
            width: 90%;
            max-width: 400px;
            height: 8px;
            background-color: #222222;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #990011, #ffffff);
            border-radius: 4px;
            position: absolute;
            left: -40%;
            animation: load 1.8s infinite ease-in-out;
        }

        .loading-text {
            color: #888888;
            font-size: 1.1rem;
            margin-top: 16px;
            letter-spacing: 2px;
            font-weight: 500;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes load {
            0% { left: -40%; }
            50% { left: 100%; width: 50%; }
            100% { left: 100%; width: 40%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .hero-section {
            height: 100vh;
            width: 100%;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #0d0d0d;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s;
        }

        .liquid-bg {
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle at 30% 30%, #990011 0%, transparent 45%),
                        radial-gradient(circle at 70% 40%, #ffffff 0%, transparent 40%),
                        radial-gradient(circle at 40% 80%, #555555 0%, transparent 45%),
                        radial-gradient(circle at 80% 80%, #202020 0%, transparent 50%);
            animation: liquidMove 18s infinite alternate ease-in-out;
            z-index: 1;
            filter: blur(40px);
        }

        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(60px) saturate(130%);
            -webkit-backdrop-filter: blur(60px) saturate(130%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.5s ease-out;
        }

        .card-top {
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            transform: translateY(-20px);
        }

        .card-top span {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .card-middle h1 {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -2px;
            opacity: 0;
            transform: translateY(30px);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card-bottom {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
        }

        .animate-fade-in {
            animation: fadeInUp 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes liquidMove {
            0% { transform: rotate(0deg) scale(1) translate(0px, 0px); }
            33% { transform: rotate(45deg) scale(1.1) translate(30px, -50px); }
            66% { transform: rotate(90deg) scale(0.95) translate(-20px, 40px); }
            100% { transform: rotate(180deg) scale(1) translate(0px, 0px); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .projects-section {
            min-height: 60vh;
            background-color: #0d0d0d;
            padding: 120px 40px 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8);
        }

        .projects-section h2, .buy-section h2 {
            font-size: 3.5rem;
            margin-bottom: 60px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .projects-grid {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: center;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: rgba(153, 0, 17, 0.5);
            background: rgba(255, 255, 255, 0.05);
        }

        .project-card h3 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .project-card p {
            color: #a3a3a3;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .project-link {
            color: #ff4d5a;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* NEW BUY SECTION & STEP SYSTEM */
        .buy-section {
            background-color: #0d0d0d;
            padding: 60px 40px 120px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .buy-container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .buy-btn, .next-btn, .done-btn, .radio-btn, .ok-btn {
            background: linear-gradient(90deg, #990011, #cc0018);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }

        .buy-btn:hover, .next-btn:hover, .done-btn:hover, .ok-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(153, 0, 17, 0.4);
        }

        .step-panel {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .step-panel.active {
            display: block;
        }

        .step-panel h4 {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            margin-bottom: 25px;
        }

        .step-panel label {
            display: block;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 25px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: #ff4d5a;
        }

        .radio-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .radio-label {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .radio-group input[type="radio"] {
            display: none;
        }

        .radio-group input[type="radio"]:checked + .radio-label {
            background: #990011;
            border-color: #ff4d5a;
            box-shadow: 0 0 10px rgba(153, 0, 17, 0.5);
        }

        .dc-link {
            display: inline-block;
            color: #ff4d5a;
            font-size: 1.3rem;
            font-weight: 600;
            text-decoration: none;
            margin: 20px 0 30px 0;
            border-bottom: 1px dashed #ff4d5a;
            transition: opacity 0.2s;
        }

        .dc-link:hover {
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PROJECT DRAWER */
        .project-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 650px;
            height: 100vh;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10000;
            padding: 40px;
            overflow-y: auto;
            transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.7);
        }

        .project-drawer.active {
            right: 0;
        }

        .close-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 30px;
            transition: background 0.3s, border-color 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .drawer-content h3 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .drawer-content .tag {
            display: inline-block;
            background: rgba(153, 0, 17, 0.2);
            color: #ff4d5a;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .drawer-content p {
            color: #e5e5e5;
            line-height: 1.8;
            font-size: 1.05rem;
            margin-bottom: 20px;
        }

        .drawer-content h4 {
            font-size: 1.4rem;
            margin: 30px 0 15px 0;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .drawer-content ul {
            list-style: none;
            margin-bottom: 25px;
        }

        .drawer-content ul li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 12px;
            color: #d4d4d4;
            line-height: 1.6;
        }

        .drawer-content ul li::before {
            content: "›";
            position: absolute;
            left: 0;
            color: #ff4d5a;
            font-size: 1.2rem;
            top: -2px;
        }

        .drawer-content strong {
            color: #ffffff;
        }

        .project-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .project-gallery img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #111;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

    <div id="main-content">
        <section class="hero-section" id="hero">
            <div class="liquid-bg"></div>
            <div class="glass-overlay"></div>

            <div class="content-wrapper" id="hero-content">
                <div class="card-top" id="anim-top">
                    <span>Let's create</span>
                </div>
                <div class="card-middle">
                    <h1 id="anim-middle">Hello,<br>I'm a<br>Designer.</h1>
                </div>
                <div class="card-bottom" id="anim-bottom">
                    @kamnexx
                </div>
            </div>
        </section>

        <section class="projects-section">
            <h2>My Projects</h2>
            
            <div class="projects-grid">
                <div class="project-card" onclick="openDrawer()">
                    <h3>Lunatic Shop</h3>
                    <p>Advanced e-commerce ecosystem built on Discord, integrating proprietary backend systems with complex UI/UX architecture.</p>
                    <span class="project-link">View details &rarr;</span>
                </div>
            </div>
        </section>

        <!-- NEW BUY A PROJECT SECTION -->
        <section class="buy-section">
            <h2>Order a Project</h2>
            <div class="buy-container" id="buy-box">
                <button class="buy-btn" onclick="startForm()">Buy a project</button>
            </div>
        </section>
    </div>

    <div class="project-drawer" id="drawer">
        <button class="close-btn" onclick="closeDrawer()">Close</button>
        <div class="drawer-content" id="drawer-dynamic-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
