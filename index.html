<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030303;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .progress-bar {
            width: 90%;
            max-width: 400px;
            height: 8px;
            background-color: #161b22;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border-radius: 4px;
            position: absolute;
            left: -40%;
            animation: load 1.8s infinite ease-in-out;
        }

        .loading-text {
            color: #8b949e;
            font-size: 1.1rem;
            margin-top: 16px;
            letter-spacing: 2px;
            font-weight: 500;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes load {
            0% { left: -40%; }
            50% { left: 100%; width: 50%; }
            100% { left: 100%; width: 40%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Kontener na sekcje z płynnym przewijaniem */
        .hero-section {
            height: 100vh;
            width: 100%;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #030303;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s;
        }

        /* Nowe żywe, mieszane kolory tła w ciągłym ruchu */
        .liquid-bg {
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle at 30% 30%, #7c3aed 0%, transparent 45%),
                        radial-gradient(circle at 70% 40%, #db2777 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, #dc2626 0%, transparent 45%),
                        radial-gradient(circle at 80% 80%, #1e3a8a 0%, transparent 50%);
            animation: liquidMove 18s infinite alternate ease-in-out;
            z-index: 1;
            filter: blur(20px);
        }

        /* Mocny efekt grubego płynnego szkła */
        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(50px) saturate(140%);
            -webkit-backdrop-filter: blur(50px) saturate(140%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.5s ease-out;
        }

        .card-top {
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            transform: translateY(-20px);
        }

        .card-top span {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .card-middle h1 {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -2px;
            opacity: 0;
            transform: translateY(30px);
        }

        .card-bottom {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
        }

        .animate-fade-in {
            animation: fadeInUp 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes liquidMove {
            0% { transform: rotate(0deg) scale(1) translate(0px, 0px); }
            33% { transform: rotate(45deg) scale(1.1) translate(30px, -50px); }
            66% { transform: rotate(90deg) scale(0.95) translate(-20px, 40px); }
            100% { transform: rotate(180deg) scale(1) translate(0px, 0px); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Druga sekcja, która nachodzi i wypycha tło */
        .projects-section {
            min-height: 100vh;
            background-color: #030303;
            padding: 120px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8);
        }

        .projects-section h2 {
            font-size: 3.5rem;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

    <div id="main-content">
        <section class="hero-section" id="hero">
            <div class="liquid-bg"></div>
            <div class="glass-overlay"></div>

            <div class="content-wrapper" id="hero-content">
                <div class="card-top" id="anim-top">
                    <span>Let's create</span>
                </div>
                <div class="card-middle">
                    <h1 id="anim-middle">Hello,<br>I'm a<br>Designer.</h1>
                </div>
                <div class="card-bottom" id="anim-bottom">
                    @kamnexx
                </div>
            </div>
        </section>

        <section class="projects-section">
            <h2>My Projects</h2>
        </section>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const content = document.getElementById('main-content');
                
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                content.style.opacity = '1';

                setTimeout(() => {
                    document.getElementById('anim-top').classList.add('animate-fade-in');
                    document.getElementById('anim-middle').classList.add('animate-fade-in');
                    document.getElementById('anim-bottom').classList.add('animate-fade-in');
                }, 200);

            }, 2500);
        });

        // Dynamiczna animacja przy przechodzeniu w dół (scrollu)
        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const windowHeight = window.innerHeight;
            const hero = document.getElementById('hero');
            const heroContent = document.getElementById('hero-content');
            
            if (scrollPos <= windowHeight) {
                // Płynne podnoszenie i ściemnianie sekcji liquid glass wraz ze scrollem
                const progress = scrollPos / windowHeight;
                hero.style.transform = `translateY(-${scrollPos * 0.4}px)`;
                hero.style.opacity = 1 - progress;
                heroContent.style.transform = `translateY(-${scrollPos * 0.2}px)`;
            }
        });
    </script>

</body>
</html>
