<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .progress-bar {
            width: 90%;
            max-width: 400px;
            height: 8px;
            background-color: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 4px;
            position: absolute;
            left: -40%;
            animation: load 1.8s infinite ease-in-out;
        }

        .loading-text {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 16px;
            letter-spacing: 2px;
            font-weight: 500;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes load {
            0% { left: -40%; }
            50% { left: 100%; width: 50%; }
            100% { left: 100%; width: 40%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Animowane, płynne tło (Liquid) na całą sekcję */
        .hero-section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #050505;
        }

        .liquid-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, #4a0005 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, #990011 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, #2b0004 0%, transparent 60%);
            animation: liquidMove 15s infinite alternate ease-in-out;
            z-index: 1;
        }

        /* Warstwa Liquid Glass rozciągnięta na cały ekran */
        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 2;
        }

        /* Kontener na teksty wyrównany do układu z grafiki */
        .content-wrapper {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-top {
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            transform: translateY(-20px);
        }

        .card-top span {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .card-middle h1 {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -2px;
            opacity: 0;
            transform: translateY(30px);
        }

        .card-bottom {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Klasy aktywujące animacje wejścia */
        .animate-fade-in {
            animation: fadeInUp 1s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes liquidMove {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(120deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .projects-section {
            min-height: 100vh;
            background-color: #050505;
            padding: 100px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 3;
        }

        .projects-section h2 {
            font-size: 3rem;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

    <div id="main-content">
        <section class="hero-section">
            <div class="liquid-bg"></div>
            <div class="glass-overlay"></div>

            <div class="content-wrapper">
                <div class="card-top" id="anim-top">
                    <span>Let's create</span>
                </div>
                <div class="card-middle">
                    <h1 id="anim-middle">Hello,<br>I'm a<br>Designer.</h1>
                </div>
                <div class="card-bottom" id="anim-bottom">
                    @kamnexx
                </div>
            </div>
        </section>

        <section class="projects-section">
            <h2>My Projects</h2>
        </section>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const content = document.getElementById('main-content');
                
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                content.style.opacity = '1';

                // Odpalenie animacji tekstów po zniknięciu loadera
                setTimeout(() => {
                    document.getElementById('anim-top').classList.add('animate-fade-in');
                    document.getElementById('anim-middle').classList.add('animate-fade-in');
                    document.getElementById('anim-bottom').classList.add('animate-fade-in');
                }, 200);

            }, 2500);
        });
    </script>

</body>
</html>
