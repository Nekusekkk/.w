<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* Reset i wyśrodkowanie na całym ekranie */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f172a; /* Nowoczesne, ciemne tło */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Kontener na pasek i napis */
        .loader-container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* Styl zewnętrznego paska */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #1e293b; /* Tło paska */
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        /* Styl wypełnienia paska (animacja) */
        .progress-fill {
            height: 100%;
            width: 40%; /* Szerokość paska animowanego */
            background: linear-gradient(90deg, #3b82f6, #60a5fa); /* Ładny niebieski gradient */
            border-radius: 4px;
            position: absolute;
            left: -40%;
            animation: load 1.8s infinite ease-in-out;
        }

        /* Styl napisu Loading */
        .loading-text {
            color: #94a3b8; /* Jasnoszary kolor tekstu */
            font-size: 1.1rem;
            margin-top: 16px;
            letter-spacing: 2px;
            font-weight: 500;
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Animacja przesuwania się paska */
        @keyframes load {
            0% {
                left: -40%;
            }
            50% {
                left: 100%;
                width: 50%;
            }
            100% {
                left: 100%;
                width: 40%;
            }
        }

        /* Animacja delikatnego mrugania tekstu */
        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

</body>
</html>
