<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .progress-bar {
            width: 90%;
            max-width: 400px;
            height: 8px;
            background-color: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 4px;
            position: absolute;
            left: -40%;
            animation: load 1.8s infinite ease-in-out;
        }

        .loading-text {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 16px;
            letter-spacing: 2px;
            font-weight: 500;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes load {
            0% { left: -40%; }
            50% { left: 100%; width: 50%; }
            100% { left: 100%; width: 40%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        #main-content {
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at 70% 60%, #cc1122 0%, #440008 40%, #0a0a0a 80%);
            padding: 20px;
        }

        .glass-card {
            width: 100%;
            max-width: 500px;
            height: 650px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .card-top {
            display: flex;
            justify-content: flex-end;
        }

        .card-top span {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            font-style: italic;
        }

        .card-middle h1 {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .card-bottom {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }

        .projects-section {
            min-height: 100vh;
            background-color: #0a0a0a;
            padding: 100px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .projects-section h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

    <div id="main-content">
        <section class="hero-section">
            <div class="glass-card">
                <div class="card-top">
                    <span>Let's create</span>
                </div>
                <div class="card-middle">
                    <h1>Hello,<br>I'm a<br>Designer.</h1>
                </div>
                <div class="card-bottom">
                    @kamnexx
                </div>
            </div>
        </section>

        <section class="projects-section">
            <h2>My Projects</h2>
        </section>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const content = document.getElementById('main-content');
                
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                content.style.opacity = '1';
            }, 2500);
        });
    </script>

</body>
</html>
